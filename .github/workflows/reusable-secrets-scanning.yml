name: Reusable TN Secret Scan

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch or ref to scan. Kept for backward compatibility; defaults to the caller ref."
        required: false
        type: string
        default: ""
      depth:
        description: "Deprecated. Use fetch_depth instead."
        required: false
        type: number
        default: 2
      scan_mode:
        description: "Scan mode: pr, push, or history."
        required: false
        type: string
        default: pr
      fetch_depth:
        description: "Checkout fetch depth. Use 0 for full history."
        required: false
        type: number
        default: 0
      fail_threshold:
        description: "Lowest severity that fails pr/push scans: critical, high, medium, or low."
        required: false
        type: string
        default: high
      config_ref:
        description: "Ref in treasurenetprotocol/reusable-workflows that contains the shared Gitleaks config."
        required: false
        type: string
        default: main
      config_path:
        description: "Path to the shared Gitleaks config inside reusable-workflows."
        required: false
        type: string
        default: security/gitleaks/tn-gitleaks.toml
      gitleaks_version:
        description: "Gitleaks container version."
        required: false
        type: string
        default: v8.27.2
      trufflehog_version:
        description: "TruffleHog container version."
        required: false
        type: string
        default: 3.90.5
    secrets:
      SLACK_BOT_TOKEN:
        required: false
      SLACK_CHANNEL_ID_GITHUB_NOTIFICATION:
        required: false

permissions:
  contents: read

jobs:
  SecurityScan:
    runs-on: ubuntu-latest
    env:
      SCAN_MODE: ${{ inputs.scan_mode }}
      FAIL_THRESHOLD: ${{ inputs.fail_threshold }}
      GITLEAKS_VERSION: ${{ inputs.gitleaks_version }}
      TRUFFLEHOG_VERSION: ${{ inputs.trufflehog_version }}
      GITLEAKS_CONFIG: _tn-security-config/${{ inputs.config_path }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PUSH_BEFORE_SHA: ${{ github.event.before }}
      PUSH_AFTER_SHA: ${{ github.sha }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          case "${SCAN_MODE}" in
            pr|push|history) ;;
            *)
              echo "::error::scan_mode must be one of: pr, push, history"
              exit 2
              ;;
          esac

          case "${FAIL_THRESHOLD}" in
            critical|high|medium|low) ;;
            *)
              echo "::error::fail_threshold must be one of: critical, high, medium, low"
              exit 2
              ;;
          esac

      - name: Checkout caller repository
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b #v4.1.4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Checkout TN scanner configuration
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b #v4.1.4
        with:
          repository: treasurenetprotocol/reusable-workflows
          ref: ${{ inputs.config_ref }}
          path: _tn-security-config
          fetch-depth: 1

      - name: Prepare scan range
        id: scan-range
        run: |
          set -euo pipefail

          mkdir -p .tn-secret-scan
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          gitleaks_log_opts=""
          trufflehog_since_commit=""

          case "${SCAN_MODE}" in
            pr)
              if [ -n "${PR_BASE_SHA}" ] && git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null; then
                gitleaks_log_opts="${PR_BASE_SHA}..${PR_HEAD_SHA:-HEAD}"
                trufflehog_since_commit="${PR_BASE_SHA}"
              else
                echo "::warning::Pull request base SHA is unavailable in this checkout; scanning the checked-out history."
              fi
              ;;
            push)
              if [ -n "${PUSH_BEFORE_SHA}" ] && \
                [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ] && \
                git cat-file -e "${PUSH_BEFORE_SHA}^{commit}" 2>/dev/null; then
                gitleaks_log_opts="${PUSH_BEFORE_SHA}..${PUSH_AFTER_SHA:-HEAD}"
                trufflehog_since_commit="${PUSH_BEFORE_SHA}"
              else
                echo "::warning::Push before SHA is unavailable in this checkout; scanning the checked-out history."
              fi
              ;;
            history)
              echo "History mode scans the checked-out repository history and does not block by default."
              ;;
          esac

          {
            echo "gitleaks_log_opts=${gitleaks_log_opts}"
            echo "trufflehog_since_commit=${trufflehog_since_commit}"
          } >> "$GITHUB_OUTPUT"

      - name: Run Gitleaks
        id: gitleaks
        run: |
          set -euo pipefail

          if [ ! -f "${GITLEAKS_CONFIG}" ]; then
            echo "::error::Gitleaks config not found at ${GITLEAKS_CONFIG}"
            exit 2
          fi

          args=(
            git
            --config "/repo/${GITLEAKS_CONFIG}"
            --report-format json
            --report-path /repo/.tn-secret-scan/gitleaks.json
            --redact
            --exit-code 0
            /repo
          )

          if [ -n "${{ steps.scan-range.outputs.gitleaks_log_opts }}" ]; then
            args+=(--log-opts "${{ steps.scan-range.outputs.gitleaks_log_opts }}")
          fi

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            "ghcr.io/gitleaks/gitleaks:${GITLEAKS_VERSION}" "${args[@]}"

      - name: Run TruffleHog
        id: trufflehog
        run: |
          set -euo pipefail

          args=(
            git
            file:///repo
            --json
            --only-verified
            --no-update
          )

          if [ -n "${{ steps.scan-range.outputs.trufflehog_since_commit }}" ]; then
            args+=(--since-commit "${{ steps.scan-range.outputs.trufflehog_since_commit }}")
          fi

          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            "trufflesecurity/trufflehog:${TRUFFLEHOG_VERSION}" "${args[@]}" \
            > .tn-secret-scan/trufflehog.jsonl
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 183 ]; then
            echo "::error::TruffleHog scan failed before findings could be summarized."
            exit "$status"
          fi

      - name: Build sanitized secret scan summary
        id: summary
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          threshold = os.environ["FAIL_THRESHOLD"].lower()
          mode = os.environ["SCAN_MODE"].lower()
          severity_rank = {"critical": 4, "high": 3, "medium": 2, "low": 1, "unknown": 3}
          threshold_rank = severity_rank[threshold]
          scan_dir = Path(".tn-secret-scan")
          config_path = Path(os.environ["GITLEAKS_CONFIG"])

          rule_severities = {}
          if config_path.exists():
              with config_path.open("rb") as config_file:
                  config = tomllib.load(config_file)
              for rule in config.get("rules", []):
                  rule_id = rule.get("id")
                  if rule_id:
                      rule_severities[rule_id] = str(rule.get("severity", "high")).lower()

          findings = []

          gitleaks_report = scan_dir / "gitleaks.json"
          if gitleaks_report.exists() and gitleaks_report.stat().st_size:
              with gitleaks_report.open("r", encoding="utf-8") as report:
                  try:
                      data = json.load(report)
                  except json.JSONDecodeError:
                      print("::error::Unable to parse Gitleaks JSON report")
                      sys.exit(2)
              for item in data or []:
                  rule_id = str(item.get("RuleID") or "gitleaks-default")
                  severity = rule_severities.get(rule_id, "high")
                  findings.append({
                      "engine": "gitleaks",
                      "severity": severity,
                      "rule": rule_id,
                      "detector": item.get("Description") or rule_id,
                      "file": item.get("File") or "unknown",
                      "line": item.get("StartLine") or "",
                      "commit": str(item.get("Commit") or "")[:12],
                  })

          trufflehog_report = scan_dir / "trufflehog.jsonl"
          if trufflehog_report.exists() and trufflehog_report.stat().st_size:
              with trufflehog_report.open("r", encoding="utf-8") as report:
                  for line in report:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          item = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      source = item.get("SourceMetadata", {}).get("Data", {}).get("Git", {})
                      detector = item.get("DetectorName") or item.get("DetectorType") or "trufflehog"
                      findings.append({
                          "engine": "trufflehog",
                          "severity": "high",
                          "rule": "verified-secret",
                          "detector": detector,
                          "file": source.get("file") or source.get("File") or "unknown",
                          "line": source.get("line") or source.get("Line") or "",
                          "commit": str(source.get("commit") or source.get("Commit") or "")[:12],
                      })

          blocking = [
              finding for finding in findings
              if severity_rank.get(finding["severity"], severity_rank["unknown"]) >= threshold_rank
          ]
          should_fail = mode in {"pr", "push"} and bool(blocking)

          summary_path = scan_dir / "summary.md"
          with summary_path.open("w", encoding="utf-8") as summary:
              summary.write("# TN Secret Scan Summary\n\n")
              summary.write(f"- Mode: `{mode}`\n")
              summary.write(f"- Fail threshold: `{threshold}`\n")
              summary.write(f"- Total findings: `{len(findings)}`\n")
              summary.write(f"- Blocking findings: `{len(blocking)}`\n")
              summary.write("\n")
              summary.write("Raw secret values are intentionally excluded. Confirmed secrets require rotation, revocation, migration, or abandonment; deleting the file is not sufficient remediation.\n\n")
              if findings:
                  summary.write("| Engine | Severity | Rule | Location | Commit |\n")
                  summary.write("| --- | --- | --- | --- | --- |\n")
                  for finding in findings[:100]:
                      location = finding["file"]
                      if finding["line"]:
                          location = f"{location}:{finding['line']}"
                      row = [
                          finding["engine"],
                          finding["severity"],
                          re.sub(r"[|\n\r]", " ", str(finding["rule"]))[:120],
                          re.sub(r"[|\n\r]", " ", str(location))[:180],
                          finding["commit"] or "-",
                      ]
                      summary.write("| " + " | ".join(row) + " |\n")
                  if len(findings) > 100:
                      summary.write(f"\nAdditional findings omitted from summary: {len(findings) - 100}\n")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"total_findings={len(findings)}\n")
              output.write(f"blocking_findings={len(blocking)}\n")
              output.write(f"should_fail={'true' if should_fail else 'false'}\n")
          PY

          cat .tn-secret-scan/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Check for Slack configuration
        if: steps.summary.outputs.should_fail == 'true'
        id: slack-check
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.SLACK_BOT_TOKEN }}" ] &&
            [ -n "${{ secrets.SLACK_CHANNEL_ID_GITHUB_NOTIFICATION }}" ]; then
            echo "slack-configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "slack-configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send sanitized Slack notification
        if: steps.summary.outputs.should_fail == 'true' && steps.slack-check.outputs.slack-configured == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_GITHUB_NOTIFICATION }}
          BLOCKING_FINDINGS: ${{ steps.summary.outputs.blocking_findings }}
          TOTAL_FINDINGS: ${{ steps.summary.outputs.total_findings }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python3 <<'PY' > .tn-secret-scan/slack-payload.json
          import json
          import os

          text = (
              f"TN secret scan blocked {os.environ['REPOSITORY']}: "
              f"{os.environ['BLOCKING_FINDINGS']} blocking findings "
              f"({os.environ['TOTAL_FINDINGS']} total). "
              "Raw secret values are not included. Confirmed secrets require rotation, revocation, migration, or abandonment."
          )
          payload = {
              "channel": os.environ["SLACK_CHANNEL_ID"],
              "text": text,
              "blocks": [
                  {"type": "section", "text": {"type": "mrkdwn", "text": f"*TN secret scan failed* for `{os.environ['REPOSITORY']}`"}},
                  {"type": "section", "text": {"type": "mrkdwn", "text": f"Blocking findings: `{os.environ['BLOCKING_FINDINGS']}`\nTotal findings: `{os.environ['TOTAL_FINDINGS']}`\n<{os.environ['RUN_URL']}|View GitHub Actions run>"}},
                  {"type": "context", "elements": [{"type": "mrkdwn", "text": "Raw secret values are intentionally omitted. Rotate or revoke confirmed credentials."}]},
              ],
          }
          print(json.dumps(payload))
          PY

          curl -sSf \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data @.tn-secret-scan/slack-payload.json \
            https://slack.com/api/chat.postMessage > .tn-secret-scan/slack-response.json

          python3 <<'PY'
          import json

          with open(".tn-secret-scan/slack-response.json", "r", encoding="utf-8") as response_file:
              response = json.load(response_file)
          if not response.get("ok"):
              print(f"::warning::Slack notification failed: {response.get('error', 'unknown_error')}")
          PY

      - name: Log missing Slack configuration
        if: steps.summary.outputs.should_fail == 'true' && steps.slack-check.outputs.slack-configured == 'false'
        run: |
          echo "TN secret scan found blocking findings. Slack notification is not configured."
          echo "Set SLACK_BOT_TOKEN and SLACK_CHANNEL_ID_GITHUB_NOTIFICATION to enable sanitized failure notifications."

      - name: Enforce blocking findings
        if: steps.summary.outputs.should_fail == 'true'
        run: |
          echo "::error::TN secret scan found ${{ steps.summary.outputs.blocking_findings }} blocking findings."
          echo "Raw secret values are intentionally omitted from logs and notifications."
          echo "Confirmed secrets require rotation, revocation, migration, or abandonment."
          exit 1
