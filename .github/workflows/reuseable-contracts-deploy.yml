name: Reusable Deploy Contracts

on:
  workflow_call:
    inputs:
      action:
        required: true
        type: string
      target:
        required: true
        type: string
      network:
        required: true
        type: string
      aws_region:
        required: false
        type: string
    secrets:
      rpc:
        required: true
      private_key:
        required: true
      sm_secret_id:
        required: true

permissions:
  contents: read

env:
  NODE_VERSION: 20
  S3_BUCKET: tn-deployment-contract-abis
  AWS_REGION: ${{ inputs.aws_region && inputs.aws_region || 'us-west-1' }}

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ inputs.network || 'manual' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Compile and deploy ${{ inputs.target }} on ${{ inputs.network }}
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Remove lockfile and node_modules
        run: |
          rm -f package-lock.json
          rm -rf node_modules

      - name: Install dependencies (fresh lock on runner OS)
        run: npm install --no-audit --no-fund

      - name: Compile contracts
        run: npm run compile

      - name: Resolve npm script
        id: script
        shell: bash
        run: |
          ACTION="${{ inputs.action }}"
          TARGET="${{ inputs.target }}"
          NETWORK="${{ inputs.network }}"
          SCRIPT="${ACTION}:${TARGET}:${NETWORK}"

          SCRIPT_ENV="$SCRIPT" node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const script = process.env.SCRIPT_ENV;
          if (!pkg.scripts[script]) {
            console.error(`Script "${script}" not found in package.json. Add it before rerunning.`);
            process.exit(1);
          }
          NODE

          echo "script_name=$SCRIPT" >> "$GITHUB_OUTPUT"

      - name: Prepare network env
        shell: bash
        run: |
          RPC="${{ secrets.rpc }}"
          KEY="${{ secrets.private_key }}"

          if [ -z "$RPC" ]; then
            echo "RPC is not provided." >&2
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "Private key is not provided." >&2
            exit 1
          fi

          echo "RPC=$RPC" >> "$GITHUB_ENV"
          echo "NETWORK=${{ inputs.network }}" >> "$GITHUB_ENV"
          printf 'PRIVATE_KEY=%s\n' "$KEY" >> "$GITHUB_ENV"

      - name: Run deployment script
        env:
          RPC: ${{ env.RPC }}
          PRIVATE_KEY: ${{ env.PRIVATE_KEY }}
        run: npm run ${{ steps.script.outputs.script_name }}

      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Collect ABI JSONs (CLI)
        run: |
          set -euo pipefail
          SRC="artifacts/contracts"
          OUT="/tmp/abi-json"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          if [ ! -d "$SRC" ]; then
            echo "Artifacts directory not found: $SRC" >&2
            exit 1
          fi
          find "$SRC" -type f -name '*.json' ! -name '*.dbg.json' -print0 \
            | while IFS= read -r -d '' file; do
                if jq -e 'has("abi") and (.abi | type=="array")' "$file" >/dev/null 2>&1; then
                  rel="${file#$SRC/}"
                  mkdir -p "$OUT/$(dirname "$rel")"
                  cp "$file" "$OUT/$rel"
                  echo "kept: $rel"
                else
                  echo "skip (no abi): ${file#$SRC/}"
                fi
              done
          if [ "$(find "$OUT" -type f | wc -l)" -eq 0 ]; then
            echo "No ABI JSON files found to upload." >&2
            exit 1
          fi

      - name: Upload ABIs to S3 (AWS CLI)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONTRACT_DEPLOYER_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONTRACT_DEPLOYER_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          NETWORK: ${{ inputs.network }}
          S3_BUCKET: ${{ env.S3_BUCKET }}
        run: |
          aws s3 cp /tmp/abi-json "s3://${S3_BUCKET}/${NETWORK}/" \
            --recursive \
            --exclude "*.dbg.json" \
            --content-type "application/json"
          echo "Uploaded ABI JSONs to s3://${S3_BUCKET}/${NETWORK}/"

      - name: Update contract addresses in Secrets Manager
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONTRACT_DEPLOYER_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONTRACT_DEPLOYER_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          NETWORK: ${{ inputs.network }}
          SECRET_ID: ${{ inputs.network }}/treasurenet-tnservices-dataprovider
        run: |
          set -euo pipefail
          FILE="deployments/${NETWORK}.json"
          OUT="/tmp/contract-addresses.json"
          if [ ! -f "$FILE" ]; then
            echo "Deployment file not found: $FILE" >&2
            exit 1
          fi
          jq '(.entries | last) as $e | {
                network: $e.network,
                generatedAt: $e.generatedAt,
                contracts: ($e.contracts | with_entries({key: .key, value: .value.address}))
              }' "$FILE" > "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "No data written to $OUT" >&2
            exit 1
          fi
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_ID" \
            --secret-string file://"$OUT" \
            --region "$AWS_DEFAULT_REGION"
          echo "Updated secret $SECRET_ID with contract addresses from $FILE"
